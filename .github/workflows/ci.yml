name: Release Gates

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: release-gates-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-security:
    name: Build And Security
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run build
      - run: npm run test:route-inventory
      - run: npm run test:security
      - run: npm run test:command-center
      - run: npm run test:launch-policy
      - run: npm run test:daily-goals
      - run: npm run test:team-performance
      - run: npm run security:scan-secrets

  playwright:
    name: Playwright
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npx playwright install --with-deps chromium
      - run: npm test
      - run: npm run test:browser-smoke
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7
