[build]
  publish = "dist"
  command = "npm run build"

[[redirects]]
  from = "/recruiting"
  to = "/recruiting.html"
  status = 200

[[redirects]]
  from = "/lead-generator"
  to = "/SafeLeadGenerator-Standalone.html"
  status = 200

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

[[headers]]
  for = "/*"

  [headers.values]
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
